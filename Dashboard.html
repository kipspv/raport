<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Manager Dashboard - Kampung Inggris Pontianak</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#00003c",
            secondary: "#b22b1d",
            accent: "#4b53bc",
            "dark-bg": "#000015",
            "dark-surface": "#000022"
          },
          fontFamily: {
            display: ["Hanken Grotesk"],
            body: ["Hanken Grotesk"]
          },
          animation: {
            "slide-up": "slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards",
            "fade-in": "fadeIn 0.3s ease-out forwards"
          },
          keyframes: {
            slideUp: {
              "0%": { opacity: "0", transform: "translateY(20px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            },
            fadeIn: {
              "0%": { opacity: "0" },
              "100%": { opacity: "1" }
            }
          }
        }
      }
    };
  </script>

  <style>
    body {
      font-family: "Hanken Grotesk", sans-serif;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(150, 150, 150, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(150, 150, 150, 0.5);
    }
  </style>
</head>

<body class="bg-gray-100 text-primary dark:bg-dark-bg dark:text-white min-h-screen flex flex-col">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const APP_CONFIG = {
      API_URL: "PASTE_YOUR_DEPLOYED_APPS_SCRIPT_WEB_APP_URL_HERE",

      ROUTES: {
        login: "index.html",
        manager: "Dashboard.html",
        trainer: "TrainerDashboard.html"
      },

      STORAGE_KEY: "kipPortalSession"
    };

    const SessionStore = {
      get() {
        const local = localStorage.getItem(APP_CONFIG.STORAGE_KEY);
        const session = sessionStorage.getItem(APP_CONFIG.STORAGE_KEY);
        const raw = local || session;

        if (!raw) return null;

        try {
          const parsed = JSON.parse(raw);

          if (!parsed.token || !parsed.user) {
            this.clear();
            return null;
          }

          if (parsed.expiresAt && Date.now() > parsed.expiresAt) {
            this.clear();
            return null;
          }

          return parsed;
        } catch (err) {
          this.clear();
          return null;
        }
      },

      set(nextSession) {
        const usingLocalStorage = Boolean(localStorage.getItem(APP_CONFIG.STORAGE_KEY));
        const storage = usingLocalStorage ? localStorage : sessionStorage;
        storage.setItem(APP_CONFIG.STORAGE_KEY, JSON.stringify(nextSession));
      },

      clear() {
        localStorage.removeItem(APP_CONFIG.STORAGE_KEY);
        sessionStorage.removeItem(APP_CONFIG.STORAGE_KEY);
      }
    };

    async function apiRequest(action, data = {}, token = "") {
      if (!APP_CONFIG.API_URL || APP_CONFIG.API_URL.includes("PASTE_YOUR_DEPLOYED")) {
        throw new Error("API URL is not configured. Paste your deployed Apps Script Web App URL first.");
      }

      const response = await fetch(APP_CONFIG.API_URL, {
        method: "POST",
        body: JSON.stringify({
          action,
          data,
          token
        }),
        redirect: "follow"
      });

      const text = await response.text();

      let json;
      try {
        json = JSON.parse(text);
      } catch (err) {
        throw new Error("Invalid API response. Check the Apps Script deployment URL and access setting.");
      }

      if (!json.success) {
        throw new Error(json.message || "Request failed.");
      }

      return json;
    }

    function isManagerRole(role) {
      const normalized = String(role || "").toLowerCase();
      return normalized === "manager" || normalized === "admin" || normalized === "administrator";
    }

    function routeByRole(user) {
      if (!user) {
        window.location.href = APP_CONFIG.ROUTES.login;
        return;
      }

      if (String(user.role || "").toLowerCase() === "trainer") {
        window.location.href = APP_CONFIG.ROUTES.trainer;
        return;
      }

      window.location.href = APP_CONFIG.ROUTES.manager;
    }

    function App() {
      const [session, setSession] = useState(() => SessionStore.get());
      const [user, setUser] = useState(() => SessionStore.get()?.user || null);
      const [theme, setTheme] = useState(localStorage.getItem("portalTheme") || "light");

      const [data, setData] = useState({
        branches: [],
        classes: []
      });

      const [loading, setLoading] = useState(true);
      const [activeBranch, setActiveBranch] = useState(null);

      const [showBranchModal, setShowBranchModal] = useState(false);
      const [showClassModal, setShowClassModal] = useState(false);
      const [editingClass, setEditingClass] = useState(null);

      const [saving, setSaving] = useState(false);
      const [error, setError] = useState("");

      useEffect(() => {
        initialize();
      }, []);

      useEffect(() => {
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }

        localStorage.setItem("portalTheme", theme);
      }, [theme]);

      async function initialize() {
        const currentSession = SessionStore.get();

        if (!currentSession) {
          window.location.href = APP_CONFIG.ROUTES.login;
          return;
        }

        try {
          const me = await apiRequest("me", {}, currentSession.token);

          if (!isManagerRole(me.user.role)) {
            SessionStore.set({
              ...currentSession,
              user: me.user
            });

            routeByRole(me.user);
            return;
          }

          const nextSession = {
            ...currentSession,
            user: me.user
          };

          SessionStore.set(nextSession);
          setSession(nextSession);
          setUser(me.user);

          await fetchDashboardData(nextSession.token);
        } catch (err) {
          SessionStore.clear();
          window.location.href = APP_CONFIG.ROUTES.login;
        }
      }

      async function fetchDashboardData(token = session?.token) {
        if (!token) return;

        setLoading(true);
        setError("");

        try {
          const res = await apiRequest("getDashboardData", {}, token);

          setData({
            branches: Array.isArray(res.branches) ? res.branches : [],
            classes: Array.isArray(res.classes) ? res.classes : []
          });
        } catch (err) {
          setError(err.message || "Failed to load dashboard data.");
        } finally {
          setLoading(false);
        }
      }

      const toggleTheme = () => {
        setTheme(prev => prev === "dark" ? "light" : "dark");
      };

      const handleLogout = async () => {
        const currentToken = session?.token;

        SessionStore.clear();

        document.getElementById("root").innerHTML = `
          <div class="flex-grow flex flex-col items-center justify-center min-h-screen bg-gray-50 dark:bg-[#000015]">
            <span class="material-symbols-outlined text-5xl animate-spin text-primary dark:text-white">sync</span>
            <p class="mt-4 font-bold text-primary dark:text-white tracking-widest uppercase">Closing Session...</p>
          </div>
        `;

        try {
          if (currentToken) {
            await apiRequest("logout", {}, currentToken);
          }
        } catch (err) {
          console.warn(err);
        }

        window.location.href = APP_CONFIG.ROUTES.login;
      };

      const handleAddBranch = async (e) => {
        e.preventDefault();

        const form = e.currentTarget;
        const formData = new FormData(form);

        const newBranch = {
          branch_id: String(formData.get("b_id") || "").trim(),
          branch_name: String(formData.get("b_name") || "").trim(),
          location: String(formData.get("b_loc") || "").trim(),
          branch_leader: String(formData.get("b_leader") || "").trim()
        };

        setSaving(true);
        setError("");

        try {
          const res = await apiRequest("addNewBranch", newBranch, session.token);

          setData(prev => ({
            ...prev,
            branches: [...prev.branches, res.branch]
          }));

          setShowBranchModal(false);
        } catch (err) {
          setError(err.message || "Failed to create branch.");
        } finally {
          setSaving(false);
        }
      };

      const handleAddClass = async (e) => {
        e.preventDefault();

        const form = e.currentTarget;
        const formData = new FormData(form);

        const newClass = {
          class_id: String(formData.get("c_id") || "").trim(),
          branch: activeBranch,
          classname: String(formData.get("c_name") || "").trim(),
          trainername: String(formData.get("c_trainer") || "").trim(),
          englishlevel: String(formData.get("c_lvl") || "").trim(),
          category: String(formData.get("c_cat") || "").trim(),
          schedule: String(formData.get("c_sch") || "").trim(),
          status: String(formData.get("c_status") || "").trim(),
          sheet_link: String(formData.get("c_link") || "").trim()
        };

        setSaving(true);
        setError("");

        try {
          const res = await apiRequest("addNewClass", newClass, session.token);

          setData(prev => ({
            ...prev,
            classes: [...prev.classes, res.class]
          }));

          setShowClassModal(false);
        } catch (err) {
          setError(err.message || "Failed to create class.");
        } finally {
          setSaving(false);
        }
      };

      const handleUpdateClass = async (e) => {
        e.preventDefault();

        const form = e.currentTarget;
        const formData = new FormData(form);

        const updatedClass = {
          class_id: String(formData.get("c_id") || "").trim(),
          branch: activeBranch,
          classname: String(formData.get("c_name") || "").trim(),
          trainername: String(formData.get("c_trainer") || "").trim(),
          englishlevel: String(formData.get("c_lvl") || "").trim(),
          category: String(formData.get("c_cat") || "").trim(),
          schedule: String(formData.get("c_sch") || "").trim(),
          status: String(formData.get("c_status") || "").trim(),
          sheet_link: String(formData.get("c_link") || "").trim()
        };

        setSaving(true);
        setError("");

        try {
          const res = await apiRequest("updateClass", updatedClass, session.token);

          setData(prev => ({
            ...prev,
            classes: prev.classes.map(cls =>
              cls.class_id === res.class.class_id ? res.class : cls
            )
          }));

          setEditingClass(null);
        } catch (err) {
          setError(err.message || "Failed to update class.");
        } finally {
          setSaving(false);
        }
      };

      const handleDeleteClass = async (classId) => {
        const confirmed = window.confirm("Are you sure you want to delete this class? This cannot be undone.");

        if (!confirmed) return;

        setError("");

        try {
          await apiRequest("deleteClass", { class_id: classId }, session.token);

          setData(prev => ({
            ...prev,
            classes: prev.classes.filter(cls => cls.class_id !== classId)
          }));
        } catch (err) {
          setError(err.message || "Failed to delete class.");
        }
      };

      const closeClassModal = () => {
        setShowClassModal(false);
        setEditingClass(null);
        setError("");
      };

      if (loading) {
        return (
          <div className="flex-grow flex flex-col items-center justify-center min-h-screen">
            <span className="material-symbols-outlined text-5xl animate-spin text-primary dark:text-white">sync</span>
            <p className="mt-4 font-bold text-primary dark:text-white tracking-widest uppercase">Syncing Database</p>
          </div>
        );
      }

      return (
        <div className="flex flex-col min-h-screen relative transition-colors duration-400">
          <header className="w-full bg-white dark:bg-dark-surface border-b border-gray-200 dark:border-white/10 flex items-center justify-between px-6 py-4 sticky top-0 z-40 transition-colors duration-400">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-primary/10 dark:bg-white/10 rounded-xl flex items-center justify-center border border-primary/20 dark:border-white/20">
                <span className="material-symbols-outlined text-primary dark:text-white">corporate_fare</span>
              </div>
              <span className="font-bold tracking-tight text-primary dark:text-white text-lg">MANAGER DASHBOARD</span>
            </div>

            <div className="flex items-center gap-4 md:gap-6">
              <button onClick={toggleTheme} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition-colors flex items-center justify-center">
                <span className="material-symbols-outlined text-primary dark:text-white">
                  {theme === "dark" ? "light_mode" : "dark_mode"}
                </span>
              </button>

              <button onClick={() => fetchDashboardData()} className="hidden sm:flex items-center gap-2 bg-gray-100 dark:bg-white/10 border border-gray-200 dark:border-white/20 text-primary dark:text-white px-4 py-2 rounded-lg text-sm hover:bg-gray-200 dark:hover:bg-white/20 transition-all">
                <span className="material-symbols-outlined text-sm">refresh</span>
                Refresh
              </button>

              <div className="text-right hidden md:block">
                <p className="font-bold text-sm text-primary dark:text-white">{user?.name || "Manager"}</p>
                <p className="text-xs text-gray-500 dark:text-gray-400">{user?.role || "Manager"}</p>
              </div>

              <button onClick={handleLogout} className="flex items-center gap-2 bg-gray-100 dark:bg-white/10 border border-gray-200 dark:border-white/20 text-primary dark:text-white px-4 py-2 rounded-lg text-sm hover:bg-gray-200 dark:hover:bg-white/20 transition-all">
                <span className="material-symbols-outlined text-sm">logout</span>
                Logout
              </button>
            </div>
          </header>

          <main className="flex-grow p-6 md:p-10 max-w-[1400px] mx-auto w-full animate-fade-in">
            {error && (
              <ErrorBanner message={error} onClose={() => setError("")} />
            )}

            {!activeBranch ? (
              <BranchGrid
                branches={data.branches}
                classes={data.classes}
                onSelect={setActiveBranch}
                onAdd={() => setShowBranchModal(true)}
              />
            ) : (
              <ClassGrid
                branch={activeBranch}
                classes={data.classes.filter(cls => cls.branch === activeBranch)}
                onBack={() => setActiveBranch(null)}
                onAdd={() => setShowClassModal(true)}
                onEdit={setEditingClass}
                onDelete={handleDeleteClass}
              />
            )}
          </main>

          {showBranchModal && (
            <BranchModal
              onClose={() => {
                setShowBranchModal(false);
                setError("");
              }}
              onSubmit={handleAddBranch}
              saving={saving}
            />
          )}

          {(showClassModal || editingClass) && (
            <ClassModal
              editingClass={editingClass}
              onClose={closeClassModal}
              onSubmit={editingClass ? handleUpdateClass : handleAddClass}
              saving={saving}
            />
          )}
        </div>
      );
    }

    function ErrorBanner({ message, onClose }) {
      return (
        <div className="mb-6 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-200 px-5 py-4 rounded-2xl flex items-start justify-between gap-4 shadow-sm">
          <div className="flex items-start gap-3">
            <span className="material-symbols-outlined text-red-600 dark:text-red-300 mt-0.5">error</span>
            <div>
              <p className="font-bold">Action failed</p>
              <p className="text-sm opacity-90">{message}</p>
            </div>
          </div>

          <button onClick={onClose} className="text-red-600 dark:text-red-300 hover:opacity-70">
            <span className="material-symbols-outlined">close</span>
          </button>
        </div>
      );
    }

    function BranchGrid({ branches, classes, onSelect, onAdd }) {
      const classCountByBranch = useMemo(() => {
        return classes.reduce((acc, cls) => {
          const branch = cls.branch || "";
          acc[branch] = (acc[branch] || 0) + 1;
          return acc;
        }, {});
      }, [classes]);

      return (
        <div className="space-y-8">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 border-b border-gray-300 dark:border-white/10 pb-6 transition-colors duration-400">
            <div>
              <h1 className="text-3xl font-display font-bold text-primary dark:text-white tracking-tight">Active Branches</h1>
              <p className="text-gray-600 dark:text-white/60 mt-1">Select a facility network to manage its classes.</p>
            </div>

            <button onClick={onAdd} className="bg-primary text-white dark:bg-white dark:text-primary px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:scale-105 transition-all shadow-lg">
              <span className="material-symbols-outlined">add</span>
              Create Branch
            </button>
          </div>

          {branches.length === 0 ? (
            <div className="p-12 border border-dashed border-gray-300 dark:border-white/20 rounded-2xl text-center text-gray-500 dark:text-white/50">
              No branches available in database.
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
              {branches.map((branch, index) => (
                <div
                  key={branch.branch_id || index}
                  onClick={() => onSelect(branch.branch_name)}
                  style={{ animationDelay: `${index * 80}ms` }}
                  className="bg-primary dark:bg-white text-white dark:text-primary rounded-2xl p-6 shadow-xl cursor-pointer hover:-translate-y-2 hover:shadow-2xl transition-all duration-300 relative overflow-hidden group animate-slide-up opacity-0 border border-transparent dark:border-gray-200"
                >
                  <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 dark:bg-primary/5 rounded-bl-full -z-10 transition-colors duration-500"></div>

                  <div className="flex justify-between items-start mb-6">
                    <div className="w-12 h-12 rounded-xl bg-white/10 dark:bg-gray-100 flex items-center justify-center text-white dark:text-primary transition-colors duration-300">
                      <span className="material-symbols-outlined text-2xl">storefront</span>
                    </div>

                    <span className="text-xs font-bold text-white/80 dark:text-gray-500 bg-white/10 dark:bg-gray-100 px-3 py-1.5 rounded-full">
                      {branch.branch_id}
                    </span>
                  </div>

                  <h3 className="text-2xl font-bold mb-2 transition-colors">
                    {branch.branch_name}
                  </h3>

                  <div className="text-sm text-white/70 dark:text-gray-600 flex items-center gap-2 mb-2 font-medium">
                    <span className="material-symbols-outlined text-[18px] text-white/50 dark:text-gray-400">location_on</span>
                    {branch.location}
                  </div>

                  <div className="text-sm text-white/70 dark:text-gray-600 flex items-center gap-2 mb-2 font-medium">
                    <span className="material-symbols-outlined text-[18px] text-white/50 dark:text-gray-400">person</span>
                    Leader:
                    <span className="font-bold text-white dark:text-primary">{branch.branch_leader}</span>
                  </div>

                  <div className="mt-6 pt-4 border-t border-white/10 dark:border-gray-100 flex items-center justify-between text-sm">
                    <span className="text-white/60 dark:text-gray-500">Registered Classes</span>
                    <span className="font-bold bg-white/10 dark:bg-primary/5 px-3 py-1 rounded-lg">
                      {classCountByBranch[branch.branch_name] || 0}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function ClassGrid({ branch, classes, onBack, onAdd, onEdit, onDelete }) {
      const [search, setSearch] = useState("");

      const filteredClasses = classes.filter(cls => {
        const query = search.toLowerCase();

        return (
          String(cls.classname || "").toLowerCase().includes(query) ||
          String(cls.trainername || "").toLowerCase().includes(query) ||
          String(cls.class_id || "").toLowerCase().includes(query)
        );
      });

      return (
        <div className="space-y-8 animate-fade-in">
          <button onClick={onBack} className="flex items-center gap-2 text-gray-600 dark:text-white/60 hover:text-primary dark:hover:text-white transition-colors font-medium mb-2 group">
            <span className="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
            Return to Branches
          </button>

          <div className="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-6 border-b border-gray-300 dark:border-white/10 pb-6 transition-colors duration-400">
            <div>
              <h1 className="text-3xl font-display font-bold text-primary dark:text-white tracking-tight">{branch}</h1>
              <p className="text-gray-600 dark:text-white/60 mt-1">Manage active classes and trainer assignments.</p>
            </div>

            <div className="flex flex-col sm:flex-row w-full lg:w-auto gap-4">
              <div className="relative w-full sm:w-72 shadow-sm rounded-xl">
                <input
                  type="text"
                  placeholder="Search classes..."
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  className="w-full bg-white dark:bg-white/10 border border-gray-200 dark:border-white/20 text-primary dark:text-white placeholder-gray-400 dark:placeholder-white/50 rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-white/50 transition-all"
                />
                <span className="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 dark:text-white/50">search</span>
              </div>

              <button onClick={onAdd} className="bg-primary text-white dark:bg-white dark:text-primary px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:scale-105 transition-all shadow-lg whitespace-nowrap">
                <span className="material-symbols-outlined">add</span>
                New Class
              </button>
            </div>
          </div>

          {classes.length === 0 ? (
            <div className="p-12 border border-dashed border-gray-300 dark:border-white/20 rounded-2xl text-center text-gray-500 dark:text-white/50">
              No classes registered for this branch.
            </div>
          ) : filteredClasses.length === 0 ? (
            <div className="p-12 text-center text-gray-500 dark:text-white/50">
              No classes match your search.
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
              {filteredClasses.map((cls, index) => (
                <ClassCard
                  key={cls.class_id || index}
                  cls={cls}
                  index={index}
                  onEdit={onEdit}
                  onDelete={onDelete}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    function ClassCard({ cls, index, onEdit, onDelete }) {
      const isActive = String(cls.status || "").toLowerCase() === "active";
      const trainerInitial = String(cls.trainername || "?").charAt(0).toUpperCase();

      return (
        <div
          style={{ animationDelay: `${index * 50}ms` }}
          className="bg-primary dark:bg-white text-white dark:text-primary border border-transparent dark:border-gray-200 rounded-2xl p-6 shadow-xl hover:-translate-y-1 hover:shadow-2xl transition-all duration-300 relative animate-slide-up opacity-0 flex flex-col h-full group"
        >
          <div className="flex justify-between items-start mb-4">
            <h3 className="text-xl font-bold leading-tight pr-4">{cls.classname}</h3>

            <div className="flex items-center gap-2">
              <button onClick={() => onEdit(cls)} className="w-8 h-8 rounded-full bg-white/10 dark:bg-primary/10 flex items-center justify-center hover:bg-blue-500/50 dark:hover:bg-blue-500/20 text-white dark:text-primary transition-colors" title="Edit">
                <span className="material-symbols-outlined text-[16px]">edit</span>
              </button>

              <button onClick={() => onDelete(cls.class_id)} className="w-8 h-8 rounded-full bg-white/10 dark:bg-primary/10 flex items-center justify-center hover:bg-red-500/80 dark:hover:bg-red-500/20 text-white dark:text-secondary transition-colors" title="Delete">
                <span className="material-symbols-outlined text-[16px]">delete</span>
              </button>
            </div>
          </div>

          <div className="flex items-center gap-3 mb-4 bg-white/10 dark:bg-gray-50 p-3 rounded-xl border border-white/10 dark:border-gray-200 transition-colors duration-300">
            <div className="w-10 h-10 rounded-full bg-white dark:bg-primary text-primary dark:text-white flex items-center justify-center font-bold text-lg shadow-inner">
              {trainerInitial}
            </div>

            <div>
              <p className="text-xs text-white/60 dark:text-gray-500 font-bold uppercase tracking-wider mb-0.5">Trainer</p>
              <p className="font-bold text-sm leading-none">{cls.trainername}</p>
            </div>

            <span className={`ml-auto px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider border ${
              isActive
                ? "bg-green-500/20 text-green-300 border-green-500/30 dark:bg-green-50 dark:text-green-700 dark:border-green-200"
                : "bg-orange-500/20 text-orange-300 border-orange-500/30 dark:bg-orange-50 dark:text-orange-700 dark:border-orange-200"
            }`}>
              {cls.status}
            </span>
          </div>

          <div className="mt-auto space-y-4">
            <InfoRow label="Class ID" value={cls.class_id} />
            <InfoRow label="Category / Level" value={`${cls.category} • ${cls.englishlevel}`} />

            <div className="flex justify-between items-center text-sm pb-2">
              <span className="text-white/70 dark:text-gray-500">Schedule</span>
              <span className="font-bold bg-white/10 dark:bg-primary/5 px-2 py-1 rounded text-white dark:text-accent">{cls.schedule}</span>
            </div>

            <a
              href={cls.sheet_link || "#"}
              target="_blank"
              rel="noopener noreferrer"
              className="w-full flex items-center justify-center gap-2 py-3 mt-2 bg-white/10 hover:bg-white/20 dark:bg-gray-100 dark:hover:bg-gray-200 text-white dark:text-primary rounded-xl font-bold transition-colors"
            >
              <span className="material-symbols-outlined text-[18px]">table_chart</span>
              Open Class Sheet
            </a>
          </div>
        </div>
      );
    }

    function InfoRow({ label, value }) {
      return (
        <div className="flex justify-between items-center text-sm border-b border-white/10 dark:border-gray-100 pb-2 gap-4">
          <span className="text-white/70 dark:text-gray-500">{label}</span>
          <span className="font-bold text-right">{value}</span>
        </div>
      );
    }

    function BranchModal({ onClose, onSubmit, saving }) {
      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
          <div className="bg-white dark:bg-dark-surface text-primary dark:text-white w-full max-w-md rounded-2xl shadow-2xl p-8 animate-slide-up border border-gray-200 dark:border-white/10">
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-2xl font-bold">New Branch</h2>
              <button onClick={onClose} className="text-gray-500 hover:text-secondary dark:text-gray-400">
                <span className="material-symbols-outlined">close</span>
              </button>
            </div>

            <form onSubmit={onSubmit} className="space-y-4">
              <ModalInput name="b_id" placeholder="Branch ID, e.g. BR-003" required />
              <ModalInput name="b_name" placeholder="Branch Name" required />
              <ModalInput name="b_loc" placeholder="Location" required />
              <ModalInput name="b_leader" placeholder="Branch Leader Name" required />

              <button disabled={saving} type="submit" className="w-full mt-4 py-4 bg-primary text-white rounded-xl font-bold hover:brightness-110 shadow-lg shadow-primary/30 transition-all disabled:opacity-60 disabled:cursor-not-allowed">
                {saving ? "Saving..." : "Create Branch"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function ClassModal({ editingClass, onClose, onSubmit, saving }) {
      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
          <div className="bg-white dark:bg-dark-surface text-primary dark:text-white w-full max-w-md rounded-2xl shadow-2xl p-8 animate-slide-up border border-gray-200 dark:border-white/10 max-h-[95vh] overflow-y-auto">
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-2xl font-bold">{editingClass ? "Edit Class" : "New Class"}</h2>
              <button onClick={onClose} className="text-gray-500 hover:text-secondary dark:text-gray-400">
                <span className="material-symbols-outlined">close</span>
              </button>
            </div>

            <form onSubmit={onSubmit} className="space-y-4">
              <ModalInput
                name="c_id"
                defaultValue={editingClass?.class_id || ""}
                readOnly={Boolean(editingClass)}
                placeholder="Class ID, e.g. CLS-002"
                required
              />

              <ModalInput
                name="c_name"
                defaultValue={editingClass?.classname || ""}
                placeholder="Class Name"
                required
              />

              <ModalInput
                name="c_trainer"
                defaultValue={editingClass?.trainername || ""}
                placeholder="Trainer Name"
                required
              />

              <ModalInput
                name="c_link"
                defaultValue={editingClass?.sheet_link || ""}
                placeholder="Google Sheet Link URL"
                type="url"
                required
              />

              <div className="grid grid-cols-2 gap-4">
                <ModalSelect name="c_lvl" defaultValue={editingClass?.englishlevel || "Beginner"}>
                  <option value="Beginner" className="text-black">Beginner</option>
                  <option value="Pre-Intermediate" className="text-black">Pre-Intermediate</option>
                  <option value="Intermediate" className="text-black">Intermediate</option>
                  <option value="Advanced" className="text-black">Advanced</option>
                </ModalSelect>

                <ModalSelect name="c_cat" defaultValue={editingClass?.category || "SD 1-3"}>
                  <option value="SD 1-3" className="text-black">SD 1-3</option>
                  <option value="SD 4-6" className="text-black">SD 4-6</option>
                  <option value="SMP" className="text-black">SMP</option>
                  <option value="SMA" className="text-black">SMA</option>
                  <option value="Umum" className="text-black">Umum</option>
                </ModalSelect>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <ModalInput
                  name="c_sch"
                  defaultValue={editingClass?.schedule || ""}
                  placeholder="Schedule"
                  required
                />

                <ModalSelect name="c_status" defaultValue={editingClass?.status || "Active"}>
                  <option value="Active" className="text-black">Active</option>
                  <option value="Inactive" className="text-black">Inactive</option>
                </ModalSelect>
              </div>

              <button disabled={saving} type="submit" className="w-full mt-4 py-4 bg-primary text-white rounded-xl font-bold hover:brightness-110 shadow-lg shadow-primary/30 transition-all disabled:opacity-60 disabled:cursor-not-allowed">
                {saving ? "Saving..." : editingClass ? "Save Changes" : "Create Class"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function ModalInput({ className = "", ...props }) {
      return (
        <input
          {...props}
          className={`w-full p-3 border border-gray-200 dark:border-white/20 bg-gray-50 dark:bg-black/20 rounded-xl focus:ring-2 focus:ring-primary dark:focus:ring-white/50 outline-none font-medium text-primary dark:text-white placeholder-gray-400 dark:placeholder-gray-500 read-only:opacity-60 ${className}`}
        />
      );
    }

    function ModalSelect({ children, className = "", ...props }) {
      return (
        <select
          {...props}
          className={`w-full p-3 border border-gray-200 dark:border-white/20 bg-gray-50 dark:bg-black/20 rounded-xl focus:ring-2 focus:ring-primary dark:focus:ring-white/50 outline-none font-medium text-primary dark:text-white ${className}`}
        >
          {children}
        </select>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
